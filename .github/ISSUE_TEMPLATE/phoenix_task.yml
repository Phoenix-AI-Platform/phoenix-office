name: Phoenix Task
description: Queue a scoped Phoenix Office task for Codex and human review.
title: "[Phoenix Task]: "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        Use this form for repo-native Phoenix Office tasks that should become one narrow PR.

        Uncertain risk means manual review and manual merge only. Execution/API/MCP/server/background behavior and DOCX/proposal/business-output behavior are manual-merge-only. Docs-only work is the first potential future auto-merge candidate, but this issue template does not implement auto-merge.
  - type: input
    id: task_summary
    attributes:
      label: Task title / summary
      description: Provide the concise task title or one-sentence summary.
      placeholder: chore: add Phoenix task issue template
    validations:
      required: true
  - type: dropdown
    id: risk_class
    attributes:
      label: Task type / risk class
      description: Select the highest-risk class touched by the task. If uncertain, choose the closest higher-risk class and require manual merge.
      options:
        - docs-only
        - tests-only
        - fixtures/examples
        - CLI/read-only
        - runtime/model/schema
        - execution/API/MCP/server/background
        - DOCX/proposal/business-output
    validations:
      required: true
  - type: input
    id: source_context
    attributes:
      label: Source / preceding PR or issue
      description: Link or name the merged PR, issue, design note, or project-state entry motivating this work.
      placeholder: "After PR #142, merged at <commit SHA>"
    validations:
      required: true
  - type: textarea
    id: allowed_paths
    attributes:
      label: Intended changed files or allowed paths
      description: List the exact files or path patterns the PR may touch.
      placeholder: |
        - .github/ISSUE_TEMPLATE/phoenix_task.yml
        - docs/process/phoenix-task-labels.md
        - docs/development/project_state.md
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Explicit out-of-scope guardrails
      description: List behavior, files, systems, or risk classes the PR must not touch.
      placeholder: |
        - Do not change runtime code.
        - Do not add GitHub Actions workflows.
        - Do not add auto-merge behavior.
        - Do not add execution/API/MCP/server/background behavior.
    validations:
      required: true
  - type: textarea
    id: validation_commands
    attributes:
      label: Validation commands
      description: List expected validation commands, or explain why validation may be impractical.
      placeholder: |
        python -m pytest
        python -m ruff check .
      render: shell
    validations:
      required: true
  - type: input
    id: expected_pr_title
    attributes:
      label: Expected PR title
      description: Provide the exact expected PR title.
      placeholder: chore: add Phoenix task issue template
    validations:
      required: true
  - type: textarea
    id: required_pr_body_headings
    attributes:
      label: Required PR body headings
      description: List the exact required PR body headings.
      placeholder: |
        Summary
        Scope
        Changed files
        Out-of-scope confirmation
        Validation performed
        Risks
    validations:
      required: true
  - type: textarea
    id: codex_notes
    attributes:
      label: Codex-ready implementation notes
      description: Provide the implementation prompt, acceptance criteria, and any sequencing constraints Codex should follow.
      placeholder: |
        Before making changes, summarize the intended files and approach.
        Open one narrow PR.
        Keep the PR inside the stated allowed paths and guardrails.
    validations:
      required: true
  - type: checkboxes
    id: human_merge_reminder
    attributes:
      label: Human-merge-only flag / risk reminder
      description: Confirm merge authority expectations for this task.
      options:
        - label: I understand uncertain risk means manual review and manual merge only.
          required: true
        - label: I understand execution/API/MCP/server/background behavior is manual-merge-only.
          required: true
        - label: I understand DOCX/proposal/business-output behavior is manual-merge-only.
          required: true
        - label: I understand this issue template does not implement auto-merge or issue-to-Codex trigger behavior.
          required: true
