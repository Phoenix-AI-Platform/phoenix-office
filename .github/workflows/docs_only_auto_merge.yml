name: Docs-only auto-merge pilot

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: docs-only-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: Check docs-only auto-merge pilot
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate and merge eligible docs-only PR
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = "phoenix-automerge-docs";
            const requiredCheckGroups = [
              {
                label: "Tests",
                aliases: ["Tests", "Test and lint"],
              },
              {
                label: "Pull request body guard",
                aliases: ["Pull request body guard", "Validate PR body sections"],
              },
              {
                label: "Docs-only autopilot eligibility",
                aliases: ["Docs-only autopilot eligibility", "Check docs-only autopilot eligibility"],
              },
              {
                label: "Docs-only auto-merge dry-run",
                aliases: ["Docs-only auto-merge dry-run", "Check docs-only auto-merge dry-run"],
              },
            ];
            const requiredBodyHeadings = [
              "Summary",
              "Scope",
              "Changed files",
              "Out-of-scope confirmation",
              "Validation performed",
              "Risks",
            ];

            const pr = context.payload.pull_request;
            const labels = pr.labels.map((label) => label.name);

            if (!labels.includes(labelName)) {
              core.notice(`${labelName} label absent; docs-only auto-merge pilot not requested.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = pr.number;
            const evaluatedHeadSha = pr.head.sha;

            core.notice(`Docs-only auto-merge pilot evaluating PR #${pullNumber} at ${evaluatedHeadSha}.`);
            core.notice("Only a final eligible squash merge is allowed; no approvals, labels, comments, branch updates, or artifacts will be created.");

            const hardFailures = [];
            const deferrals = [];

            if (pr.state !== "open") {
              hardFailures.push(`PR state is ${pr.state}, expected open.`);
            }

            if (pr.base.ref !== "main") {
              hardFailures.push(`Base branch is ${pr.base.ref}, expected main.`);
            }

            if (pr.head.ref === "main") {
              hardFailures.push("Head branch is main.");
            }

            if (pr.draft) {
              hardFailures.push("PR is draft.");
            }

            if (!pr.body) {
              hardFailures.push("PR body is empty.");
            } else {
              for (const heading of requiredBodyHeadings) {
                if (!pr.body.includes(`## ${heading}`)) {
                  hardFailures.push(`Missing PR body heading: ${heading}.`);
                }
              }

              const issueReferencePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+|https:\/\/github\.com\/Phoenix-AI-Platform\/phoenix-office\/issues\/\d+|Issue:\s*#\d+/i;
              if (!issueReferencePattern.test(pr.body)) {
                hardFailures.push("PR body does not link to a Phoenix task issue.");
              }
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const allowedMarkdownPatterns = [
              /^docs\/process\/.+\.md$/,
              /^docs\/development\/.+\.md$/,
            ];
            const deniedFiles = [];

            for (const file of files) {
              const path = file.filename;
              const isAllowedMarkdown = allowedMarkdownPatterns.some((pattern) => pattern.test(path));

              if (!isAllowedMarkdown) {
                deniedFiles.push(path);
              }
            }

            if (deniedFiles.length > 0) {
              hardFailures.push(
                `Changed files outside docs/process/**/*.md or docs/development/**/*.md: ${deniedFiles.join(", ")}`,
              );
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });
            const latestReviewByUser = new Map();
            for (const review of reviews) {
              if (review.user && review.state !== "COMMENTED") {
                latestReviewByUser.set(review.user.login, review.state);
              }
            }
            const requestedChanges = [...latestReviewByUser.values()].includes("CHANGES_REQUESTED");
            if (requestedChanges) {
              hardFailures.push("A current review requests changes.");
            }

            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner,
              repo,
              ref: evaluatedHeadSha,
              per_page: 100,
            });
            const combinedStatus = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: evaluatedHeadSha,
            });

            const discoveredCheckNames = [...new Set(checkRuns.map((check) => check.name))].sort();
            const discoveredStatusContexts = [...new Set(combinedStatus.data.statuses.map((status) => status.context))].sort();

            function latestByDate(items, dateSelector) {
              return items.sort((a, b) => new Date(dateSelector(b)) - new Date(dateSelector(a)))[0];
            }

            function resolveRequiredCheckGroup(group) {
              const candidates = [];

              for (const alias of group.aliases) {
                const latestCheck = latestByDate(
                  checkRuns.filter((check) => check.name === alias),
                  (check) => check.started_at || check.created_at,
                );
                if (latestCheck) {
                  candidates.push({
                    kind: "check_run",
                    name: alias,
                    state: `${latestCheck.status}/${latestCheck.conclusion}`,
                    successful: latestCheck.status === "completed" && latestCheck.conclusion === "success",
                    pending: latestCheck.status !== "completed" || latestCheck.conclusion === null,
                  });
                }

                const latestStatus = latestByDate(
                  combinedStatus.data.statuses.filter((status) => status.context === alias),
                  (status) => status.created_at,
                );
                if (latestStatus) {
                  candidates.push({
                    kind: "status",
                    name: alias,
                    state: latestStatus.state,
                    successful: latestStatus.state === "success",
                    pending: latestStatus.state === "pending",
                  });
                }
              }

              if (candidates.some((candidate) => candidate.successful)) {
                return { state: "success", candidates };
              }

              if (candidates.some((candidate) => !candidate.pending)) {
                return { state: "failed", candidates };
              }

              if (candidates.some((candidate) => candidate.pending)) {
                return { state: "pending", candidates };
              }

              core.notice(`Missing ${group.label}. Accepted aliases: ${group.aliases.join(", ")}`);
              core.notice(`Discovered check-run names: ${discoveredCheckNames.join(", ") || "(none)"}`);
              core.notice(`Discovered status contexts: ${discoveredStatusContexts.join(", ") || "(none)"}`);
              return { state: "missing", candidates };
            }

            for (const group of requiredCheckGroups) {
              const result = resolveRequiredCheckGroup(group);
              const candidateSummary = result.candidates
                .map((candidate) => `${candidate.kind} ${candidate.name} ${candidate.state}`)
                .join("; ");
              core.notice(`${group.label}: ${result.state}${candidateSummary ? ` (${candidateSummary})` : ""}`);

              if (result.state === "failed") {
                hardFailures.push(`${group.label} failed for ${evaluatedHeadSha}.`);
              } else if (result.state !== "success") {
                deferrals.push(`${group.label} is ${result.state} for ${evaluatedHeadSha}.`);
              }
            }
            if (hardFailures.length > 0) {
              core.setFailed(`Docs-only auto-merge pilot failed closed: ${hardFailures.join(" ")}`);
              return;
            }

            if (deferrals.length > 0) {
              core.notice(`Docs-only auto-merge pilot deferred without merging: ${deferrals.join(" ")}`);
              return;
            }

            const reread = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const currentPr = reread.data;
            const currentLabels = currentPr.labels.map((label) => label.name);

            if (!currentLabels.includes(labelName)) {
              core.notice(`${labelName} label was removed before merge; deferred without merging.`);
              return;
            }

            if (currentPr.state !== "open") {
              core.setFailed(`PR state changed to ${currentPr.state}; refusing to merge.`);
              return;
            }

            if (currentPr.draft) {
              core.setFailed("PR became draft before merge; refusing to merge.");
              return;
            }

            if (currentPr.head.sha !== evaluatedHeadSha) {
              core.setFailed(`Head SHA changed from ${evaluatedHeadSha} to ${currentPr.head.sha}; refusing to merge.`);
              return;
            }

            if (currentPr.base.ref !== "main" || currentPr.head.ref === "main") {
              core.setFailed("Branch conditions changed before merge; refusing to merge.");
              return;
            }

            if (currentPr.mergeable !== true) {
              core.notice(`GitHub mergeability is ${currentPr.mergeable}; deferred without merging.`);
              return;
            }

            core.notice(`Docs-only auto-merge pilot merging PR #${pullNumber} at ${evaluatedHeadSha} with squash merge.`);
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pullNumber,
              commit_title: currentPr.title,
              commit_message: `Docs-only auto-merge pilot merged PR #${pullNumber} after required gates passed.`,
              merge_method: "squash",
              sha: evaluatedHeadSha,
            });
