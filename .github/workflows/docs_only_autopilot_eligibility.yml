name: Docs-only autopilot eligibility

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  eligibility:
    name: Check docs-only autopilot eligibility
    runs-on: ubuntu-latest

    steps:
      - name: Check eligibility
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = "phoenix-automerge-docs";
            const pr = context.payload.pull_request;
            const labels = pr.labels.map((label) => label.name);

            if (!labels.includes(labelName)) {
              core.notice(`${labelName} label absent; docs-only autopilot eligibility not requested.`);
              return;
            }

            const failures = [];

            if (pr.draft) {
              failures.push("PR is draft.");
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const allowedMarkdownPatterns = [
              /^docs\/process\/.+\.md$/,
              /^docs\/development\/.+\.md$/,
            ];

            const deniedFiles = [];

            for (const file of files) {
              const path = file.filename;
              const isAllowedMarkdown = allowedMarkdownPatterns.some((pattern) => pattern.test(path));

              if (!isAllowedMarkdown) {
                deniedFiles.push(path);
              }
            }

            if (deniedFiles.length > 0) {
              failures.push(
                `Changed files outside docs/process/**/*.md or docs/development/**/*.md: ${deniedFiles.join(", ")}`,
              );
            }

            if (failures.length > 0) {
              core.setFailed(`Docs-only autopilot eligibility failed closed: ${failures.join(" ")}`);
              return;
            }

            core.notice(
              `${labelName} eligibility passed: non-draft PR with only docs/process/**/*.md and docs/development/**/*.md changes. This is not merge approval.`,
            );
