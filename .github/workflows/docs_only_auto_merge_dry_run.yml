name: Docs-only auto-merge dry-run
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_run:
    workflows: [Tests, Pull request body guard, Docs-only autopilot eligibility]
    types: [completed]
permissions:
  checks: read
  contents: read
  pull-requests: read
  statuses: read
jobs:
  dry_run:
    name: Check docs-only auto-merge dry-run
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.e.outputs.decision }}
      eligible: ${{ steps.e.outputs.eligible }}
      deferred: ${{ steps.e.outputs.deferred }}
    steps:
      - name: Evaluate dry-run gates
        id: e
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const O=context.repo.owner,R=context.repo.repo,L="phoenix-automerge-docs";
            const G=[{l:"Tests",a:["Tests","Test and lint"]},{l:"Pull request body guard",a:["Pull request body guard","Validate PR body sections"]},{l:"Docs-only autopilot eligibility",a:["Docs-only autopilot eligibility","Check docs-only autopilot eligibility"]}];
            const H=["Summary","Scope","Changed files","Out-of-scope confirmation","Validation performed","Risks"];
            const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
            const latest=(xs,f)=>xs.sort((a,b)=>new Date(f(b))-new Date(f(a)))[0];
            function done(d,x={}){const e=d==="eligible",q=d==="deferred",p=x.p||[],s=x.s||[];core.setOutput("decision",d);core.setOutput("eligible",String(e));core.setOutput("deferred",String(q));core.notice(`decision=${d}; eligible=${e}; deferred=${q}; failures=${x.f||0}; pending=${p.join(", ")||"(none)"}; states=${s.join(" | ")||"(none)"}`);return d;}
            async function pr(n){return (await github.rest.pulls.get({owner:O,repo:R,pull_number:n})).data;}
            async function prFromRun(w){if(w.pull_requests?.length)return w.pull_requests[0].number;const ps=await github.paginate(github.rest.repos.listPullRequestsAssociatedWithCommit,{owner:O,repo:R,commit_sha:w.head_sha,per_page:100});const m=ps.filter(p=>p.state==="open"&&p.head.sha===w.head_sha);return m.length===1?m[0].number:null;}
            async function checks(sha,tag){const cr=await github.paginate(github.rest.checks.listForRef,{owner:O,repo:R,ref:sha,per_page:100});const cs=(await github.rest.repos.getCombinedStatusForRef({owner:O,repo:R,ref:sha})).data.statuses;const f=[],p=[],s=[];for(const g of G){const c=[];for(const a of g.a){const k=latest(cr.filter(r=>r.name===a),r=>r.started_at||r.created_at);if(k)c.push({t:"check",n:a,st:`${k.status}/${k.conclusion}`,ok:k.status==="completed"&&k.conclusion==="success",wait:k.status!=="completed"||k.conclusion===null});const v=latest(cs.filter(r=>r.context===a),r=>r.created_at);if(v)c.push({t:"status",n:a,st:v.state,ok:v.state==="success",wait:v.state==="pending"});}let z="missing";if(c.some(x=>x.ok))z="success";else if(c.some(x=>!x.wait))z="failed";else if(c.some(x=>x.wait))z="pending";const line=`[${tag}] ${g.l}: ${z}${c.length?` (${c.map(x=>`${x.t} ${x.n} ${x.st}`).join("; ")})`:""}`;core.notice(line);s.push(line);if(z==="pending")p.push(g.l);if(z==="failed"||z==="missing")f.push(`${g.l} is ${z}.`);}return{f,p,s};}
            async function mergeable(n,sha,tag){const x=await pr(n),f=[];core.notice(`[${tag}] mergeable=${x.mergeable}`);if(x.head.sha!==sha)f.push(`Head SHA changed from ${sha} to ${x.head.sha}.`);if(x.mergeable===false)f.push("GitHub reports PR is not mergeable.");if(x.mergeable===null)f.push("GitHub mergeability is unknown.");return f;}
            let n,trigger;if(context.eventName==="workflow_run"){const w=context.payload.workflow_run;n=await prFromRun(w);if(!n)return done("not_applicable");trigger=w.head_sha;}else{n=context.payload.pull_request.number;trigger=context.payload.pull_request.head.sha;}
            const P=await pr(n),sha=P.head.sha;if(!P.labels.map(x=>x.name).includes(L))return done("not_requested");if(context.eventName==="workflow_run"&&sha!==trigger)return done("stale");
            const sf=[];if(P.base.ref!=="main")sf.push(`Base branch is ${P.base.ref}, expected main.`);if(P.head.ref===P.base.ref)sf.push("Head branch matches base branch.");if(P.draft)sf.push("PR is draft.");if(!P.body)sf.push("PR body is empty.");else{for(const h of H)if(!P.body.includes(`## ${h}`))sf.push(`Missing PR body heading: ${h}.`);if(!/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+|https:\/\/github\.com\/Phoenix-AI-Platform\/phoenix-office\/issues\/\d+|Issue:\s*#\d+/i.test(P.body))sf.push("PR body does not link to a Phoenix task issue.");}
            const files=await github.paginate(github.rest.pulls.listFiles,{owner:O,repo:R,pull_number:n,per_page:100});const bad=files.map(x=>x.filename).filter(x=>![/^docs\/process\/.+\.md$/,/^docs\/development\/.+\.md$/].some(r=>r.test(x)));if(bad.length)sf.push(`Changed files outside docs/process/**/*.md or docs/development/**/*.md: ${bad.join(", ")}`);
            const rev=await github.paginate(github.rest.pulls.listReviews,{owner:O,repo:R,pull_number:n,per_page:100});const m=new Map();for(const r of rev)if(r.user&&r.state!=="COMMENTED")m.set(r.user.login,r.state);if([...m.values()].includes("CHANGES_REQUESTED"))sf.push("A current review requests changes.");
            let c=await checks(sha,"initial"),f=[...sf,...c.f,...await mergeable(n,sha,"initial")];if(f.length){core.setFailed(f.join(" "));return done("failed",{f:f.length,p:c.p,s:c.s});}
            for(let i=1;i<=4&&c.p.length;i++){core.notice(`settling attempt ${i}/4 for ${c.p.join(", ")}`);await sleep(15000);c=await checks(sha,`settle ${i}`);f=[...sf,...c.f,...await mergeable(n,sha,`settle ${i}`)];if(f.length){core.setFailed(f.join(" "));return done("failed",{f:f.length,p:c.p,s:c.s});}}
            return c.p.length?done("deferred",{p:c.p,s:c.s}):done("eligible",{p:[],s:c.s});
  report-dry-run-outputs:
    name: Report docs-only auto-merge dry-run outputs
    needs: dry_run
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Report resolved dry-run outputs
        run: |
          echo "dry_run_result=${{ needs.dry_run.result }}"
          echo "decision=${{ needs.dry_run.outputs.decision }}"
          echo "eligible=${{ needs.dry_run.outputs.eligible }}"
          echo "deferred=${{ needs.dry_run.outputs.deferred }}"
  confirm-eligible:
    name: Confirm docs-only auto-merge dry-run eligibility
    needs: dry_run
    if: ${{ needs.dry_run.outputs.decision == 'eligible' }}
    runs-on: ubuntu-latest
    steps:
      - name: Confirm eligible dry-run
        run: echo "Docs-only auto-merge dry-run eligibility was confirmed."
